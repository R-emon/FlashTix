spring:
  application:
    name: flashtix-api

  datasource:
    url: jdbc:mysql://localhost:3307/flashtix_db?allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: admin7576
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update # For dev: Will change to validate for prod and use Flyway/Liquibase
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: localhost
      port: 6379

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

server:
  port: 8080

jwt:
  secret: a-very-secure-256-bit-minimum-secret-key-that-should-be-in-env-variables
  expiration: 86400000 # 24 hours

logging:
  level:
    org.springframework.web: INFO
    com.flashtix: DEBUG
